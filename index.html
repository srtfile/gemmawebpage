<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stream Resolver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#111; color:#eee; font-family:sans-serif; padding:2rem; }
  h2 { margin-bottom:1.5rem; color:#e50914; }
  .row { display:flex; gap:.5rem; margin-bottom:1rem; }
  input { padding:.6rem; flex:1; max-width:300px; background:#222; color:#fff; border:1px solid #444; border-radius:4px; }
  button { padding:.6rem 1.2rem; background:#e50914; color:#fff; border:none; border-radius:4px; cursor:pointer; }
  button:hover { background:#c00; }
  #status { color:#aaa; margin:.5rem 0 1rem; font-size:.9rem; }
  .card { background:#1e1e1e; border-radius:8px; padding:1rem; margin:.5rem 0; }
  .lang { font-weight:bold; color:#e50914; margin-bottom:.4rem; }
  .url { font-size:.72rem; color:#888; word-break:break-all; margin:.4rem 0; }
  .actions { display:flex; gap:.5rem; margin-top:.5rem; }
  .actions a, .actions button {
    padding:.3rem .7rem; font-size:.8rem; border-radius:4px;
    text-decoration:none; cursor:pointer; border:none;
  }
  .btn-open { background:#4af; color:#000; }
  .btn-copy { background:#444; color:#fff; }
  .btn-copy:hover { background:#666; }
  .error { color:#f55; }
</style>
</head>
<body>
<h2>🎬 Stream Resolver</h2>
<div class="row">
  <input id="imdb" placeholder="tt0848228" value="tt0848228">
  <button onclick="resolve()">Resolve</button>
</div>
<div id="status"></div>
<div id="results"></div>

<script>
const BASE = "https://gemma416okl.com";
const WORKER = "https://gemma.narutoanimeinspirationquote.workers.dev";

function workerGet(url) {
  return `${WORKER}?url=${encodeURIComponent(url)}`;
}

async function fetchGet(url) {
  const res = await fetch(workerGet(url), { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error(`GET failed: ${res.status}`);
  return await res.text();
}

async function fetchPost(url, token, referer) {
  const res = await fetch(workerGet(url), {
    method: "POST",
    headers: {
      "X-CSRF-Token": token,
      "Content-Type": "application/x-www-form-urlencoded",
      "Referer": referer,
      "Origin": BASE,
    },
    body: "",
    signal: AbortSignal.timeout(10000)
  });
  if (!res.ok) throw new Error(`POST failed: ${res.status}`);
  const raw = await res.arrayBuffer();
  const text = new TextDecoder().decode(new Uint8Array(raw));

  // try base64 decode
  try {
    const decoded = atob(text.trim());
    if ("[{#h".includes(decoded[0])) {
      if ("[{".includes(decoded[0])) return JSON.parse(decoded);
      return decoded;
    }
  } catch(e) {}

  if ("[{".includes(text[0])) return JSON.parse(text);
  return text;
}

async function resolve() {
  const imdb = document.getElementById("imdb").value.trim();
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  results.innerHTML = "";
  status.className = "";
  status.textContent = "Fetching page...";

  try {
    const pageUrl = `${BASE}/play/${imdb}`;
    const html = await fetchGet(pageUrl);

    const cfgMatch = html.match(/let\s+p3\s*=\s*(\{.+?\});/s);
    if (!cfgMatch) throw new Error("Player config not found");
    const cfg = JSON.parse(cfgMatch[1]);
    const token = cfg.key;
    const filePath = cfg.file;

    status.textContent = "Token found. Fetching tracks...";

    const tracks = await fetchPost(filePath, token, pageUrl);
    const flatTracks = flatten(tracks).filter(t => t.file);

    status.textContent = `Found ${flatTracks.length} track(s)`;
    if (!flatTracks.length) { status.textContent = "No tracks found."; return; }

    for (const t of flatTracks) {
      const fp = t.file;
      const pl = fp.startsWith("~") ? fp.slice(1) + ".txt" : fp;
      const plUrl = pl.startsWith("http") ? pl : `${BASE}/playlist/${encodeURIComponent(pl)}`;
      let streamUrl = "";
      try {
        const raw = await fetchPost(plUrl, token, pageUrl);
        streamUrl = typeof raw === "string" ? raw.trim().split("\n")[0] : "";
      } catch(e) { continue; }
      if (!streamUrl) continue;

      const safeUrl = streamUrl.replace(/`/g, "");
      results.innerHTML += `
        <div class="card">
          <div class="lang">${t.title || "?"}</div>
          <div class="url">${safeUrl}</div>
          <div class="actions">
            <a class="btn-open" href="${safeUrl}" target="_blank">▶ Open</a>
            <button class="btn-copy" onclick="copyUrl(this, \`${safeUrl}\`)">Copy URL</button>
          </div>
        </div>`;
    }

    if (!results.innerHTML) status.textContent = "No stream URLs resolved.";

  } catch(e) {
    status.textContent = "Error: " + e.message;
    status.className = "error";
  }
}

function flatten(obj) {
  if (obj && typeof obj === "object" && !Array.isArray(obj)) return [obj];
  if (Array.isArray(obj)) {
    const out = [];
    for (const i of obj) out.push(...flatten(i));
    return out;
  }
  return [];
}

function copyUrl(btn, url) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy URL", 2000);
  });
}
</script>
</body>
</html>
